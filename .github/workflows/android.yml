name: Android

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Android receiver
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-37" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1

      - name: Test and assemble APK
        working-directory: apps/android
        run: gradle --no-daemon testDebugUnitTest assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: CableSpeaker-Android-Debug-Apk
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
